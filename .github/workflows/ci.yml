# ci.yml — push/PR quality + scanning gate (CICD-01, CICD-02, and the CI
# wiring of CICD-04 + CICD-05).
#
# Three parallel jobs, none of which deploy:
#   quality-gate   — typecheck + lint + format:check + Vitest (workers pool,
#                    real D1/KV binding mocks). Runs GREEN on the un-setup
#                    template as-is (D-11); sentinels are not scanned here.
#   secret-scan    — MIT gitleaks BINARY (not the org-license-gated Action,
#                    Pitfall 1) + the auditable scripts/secret-grep.sh.
#   sentinel-scan  — scaffolds a setup.mjs --yes copy of the tree into a temp
#                    dir, then runs scripts/ci-sentinel-scan.mjs against it
#                    (never the template tree directly, Pitfall 2).
#
# The gate holds NO Cloudflare token and never deploys — CICD-03 is a separate
# Workers Builds path (documented in the README, not wired here, T-06-07).
# Every third-party Action is pinned to a commit SHA (supply-chain, T-06-06);
# update the trailing version comment on bump.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege GITHUB_TOKEN (D-07): every job only checks out and runs
# Node/pnpm/grep tooling — none deploy — so read-only is sufficient.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate: # CICD-01 / CICD-02
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # pnpm BEFORE setup-node so `cache: pnpm` can resolve the binary (Pitfall 4).
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm cf-typegen # keep Env types in sync with the bindings
      - run: pnpm typecheck # tsc -b, no full Vite bundle
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test # workers pool exercises the API vs real D1/KV mocks (CICD-02)

  cms-typecheck: # CICD-06 — the CMS Worker typechecks in its OWN isolated package.
    # SEPARATE parallel job (never folded into quality-gate, D-06): cms/ pins
    # drizzle-orm@^0.44 + the @sonicjs-cms/core beta against its own frozen
    # cms/pnpm-lock.yaml, which must NOT share node_modules with the root
    # (root pins drizzle-orm@^0.45 — a shared install would resolve one wrongly).
    # No `cache: pnpm` here: the action caches against the root lockfile, so
    # scoping it to cms/ is not worth the drift risk for a single small install.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # pnpm BEFORE setup-node (Pitfall 4), same SHA-pins as quality-gate.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc

      - run: pnpm install --frozen-lockfile # cms/pnpm-lock.yaml, isolated
      - run: pnpm typecheck # tsc --noEmit against cms/tsconfig.json

  secret-scan: # CICD-05
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # MIT gitleaks v8 — verified latest tag + asset name at exec (RESEARCH A1).
      # Bump GITLEAKS_VERSION and GITLEAKS_SHA256 together on any upgrade (D-08).
      GITLEAKS_VERSION: 8.30.1
      GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install gitleaks (MIT binary, checksum-verified, not the org-licensed Action)
        run: |
          ASSET="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${ASSET}" -o "$ASSET"
          echo "${GITLEAKS_SHA256}  ${ASSET}" | sha256sum -c -
          tar -xzf "$ASSET" -C /usr/local/bin gitleaks
          gitleaks version

      - name: gitleaks breadth scan
        run: gitleaks dir . --config .gitleaks.toml --redact --exit-code 1 -v

      - name: Targeted in-repo secret grep
        run: bash scripts/secret-grep.sh

  sentinel-scan: # CICD-04 (scaffold a generated copy, then scan it)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc

      # D-07: fail if any wrangler.* config in the REAL tree is outside
      # SUBSTITUTION_FILESET — i.e. a new Worker config setup.mjs never
      # parameterizes and the sentinel/secret scans would never scan.
      - name: Assert every wrangler.* is covered by setup.mjs
        run: node scripts/ci-wrangler-coverage.mjs .

      - name: Scaffold a setup.mjs --yes copy and scan it
        run: |
          TMP="$(mktemp -d)"
          rsync -a \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.wrangler' \
            --exclude='dist' \
            ./ "$TMP/"
          ( cd "$TMP" && node setup.mjs --yes \
              --name ci-test-proj \
              --app-name "CI Test" \
              --clerk-pk pk_test_Y2ktdGVzdC5jbGVyay5hY2NvdW50cy5kZXYk )
          node scripts/ci-sentinel-scan.mjs "$TMP"
